name: CD

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        shell: powershell
        run: |
          try {
            docker compose down
          } catch {
            Write-Host "No existing stack to stop, continuing..."
          }

          docker compose up --build -d

